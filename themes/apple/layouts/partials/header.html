<nav class="nav" id="site-nav" aria-label="Site navigation">
  <div class="nav__wrap">
    <a class="nav__brand" href="{{ "/" | relURL }}">
      <span class="nav__brand-icon" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.25"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"/>
          <line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
      </span>
      {{- .Site.Params.author.name | default .Site.Title -}}
    </a>
    <div class="nav__right">
      <ul class="nav__links" role="list">
        {{- range .Site.Menus.main -}}
        <li>
          <a href="{{ .URL }}"
            {{- if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}
            {{- if not .Page }} target="_blank" rel="noopener noreferrer"{{ end }}>
            {{- .Name -}}
          </a>
        </li>
        {{- end -}}
      </ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour theme">
        {{/* Sun — shown in dark mode: click to switch to light */}}
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        {{/* Moon — shown in light mode: click to switch to dark */}}
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="nav__hamburger" id="nav-hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-drawer">
        <svg class="icon-menu" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg class="icon-close" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="nav__drawer" id="nav-drawer" aria-hidden="true">
    <ul role="list">
      {{- range .Site.Menus.main -}}
      <li>
        <a href="{{ .URL }}"
          {{- if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}
          {{- if not .Page }} target="_blank" rel="noopener noreferrer"{{ end }}>
          {{- .Name -}}
        </a>
      </li>
      {{- end -}}
    </ul>
  </div>
</nav>
