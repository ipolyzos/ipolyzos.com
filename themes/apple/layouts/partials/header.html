<nav class="nav" aria-label="Site navigation">
  <div class="nav__wrap">
    <a class="nav__brand" href="{{ "/" | relURL }}">
      <span class="nav__brand-dot" aria-hidden="true"></span>
      {{- .Site.Params.author.name | default .Site.Title -}}
    </a>
    <div class="nav__right">
      <ul class="nav__links" role="list">
        {{- range .Site.Menus.main -}}
        <li>
          <a href="{{ .URL }}"
            {{- if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}
            {{- if not .Page }} target="_blank" rel="noopener noreferrer"{{ end }}>
            {{- .Name -}}
          </a>
        </li>
        {{- end -}}
      </ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour theme">
        {{/* Sun — shown in dark mode: click to switch to light */}}
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        {{/* Moon — shown in light mode: click to switch to dark */}}
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</nav>
