<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
{{ partial "head.html" . }}
<title>Page Not Found · {{ .Site.Title }}</title>
</head>
<body>
{{ partial "header.html" . }}
<main id="content">
<section class="section section--alt">
  <div class="section__wrap" style="text-align:center;padding:6rem 1rem;">
    <p style="font-size:5rem;font-weight:700;color:var(--muted);line-height:1;margin-bottom:1rem;">404</p>
    <h1 style="font-size:1.75rem;font-weight:600;margin-bottom:.75rem;">Page not found</h1>
    <p style="color:var(--muted);margin-bottom:2rem;">The page you were looking for doesn't exist or has been moved.</p>
    <a href="{{ "/" | relURL }}" style="display:inline-flex;align-items:center;gap:.5rem;background:var(--accent);color:#fff;padding:.6rem 1.4rem;border-radius:980px;font-size:.9rem;font-weight:500;text-decoration:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
      Back to home
    </a>
  </div>
</section>
</main>
{{ partial "footer.html" . }}
</body>
</html>
